<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Case Tracking System{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; display: flex; min-height: 100vh; }

        .sidebar {
            width: 240px; min-height: 100vh;
            background: linear-gradient(180deg, #1a2a4a 0%, #0f1e36 100%);
            display: flex; flex-direction: column;
            position: fixed; top: 0; left: 0;
            z-index: 100; transition: transform 0.3s;
        }
        .sidebar-brand {
            padding: 24px 20px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            text-align: center;
        }
        .sidebar-brand .brand-icon { font-size: 32px; margin-bottom: 8px; }
        .sidebar-brand h2 { color: white; font-size: 13px; font-weight: 700; line-height: 1.4; }
        .sidebar-brand p { color: rgba(255,255,255,0.5); font-size: 11px; margin-top: 4px; }

        .sidebar-nav { flex: 1; padding: 16px 0; }
        .nav-label {
            font-size: 10px; font-weight: 700;
            color: rgba(255,255,255,0.3); text-transform: uppercase;
            letter-spacing: 1px; padding: 8px 20px 4px;
        }
        .nav-item {
            display: flex; align-items: center; gap: 12px;
            padding: 11px 20px; color: rgba(255,255,255,0.65);
            text-decoration: none; font-size: 14px; font-weight: 500;
            transition: all 0.2s; border-left: 3px solid transparent;
        }
        .nav-item:hover { background: rgba(255,255,255,0.07); color: white; }
        .nav-item.active { background: rgba(46,95,173,0.35); color: white; border-left-color: #4d9fff; }
        .nav-item .icon { font-size: 17px; width: 22px; text-align: center; }

        .sidebar-footer {
            padding: 16px 20px;
            border-top: 1px solid rgba(255,255,255,0.08);
        }
        .user-info { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
        .user-avatar {
            width: 36px; height: 36px;
            background: linear-gradient(135deg, #2e5fad, #4d9fff);
            border-radius: 50%; display: flex; align-items: center;
            justify-content: center; font-size: 16px; color: white; flex-shrink: 0;
        }
        .user-details .name { color: white; font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 150px; }
        .user-details .role { color: rgba(255,255,255,0.45); font-size: 11px; text-transform: capitalize; }
        .btn-logout {
            display: flex; align-items: center; gap: 8px; width: 100%;
            padding: 9px 14px; background: rgba(220,53,69,0.2);
            color: #ff6b7a; border: 1px solid rgba(220,53,69,0.3);
            border-radius: 7px; font-size: 13px; font-weight: 600;
            cursor: pointer; text-decoration: none; transition: background 0.2s;
        }
        .btn-logout:hover { background: rgba(220,53,69,0.35); }

        .topbar {
            position: fixed; top: 0; left: 240px; right: 0; height: 60px;
            background: white; border-bottom: 1px solid #e8eaf0;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 24px; z-index: 99; box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }
        .topbar-title { font-size: 17px; font-weight: 700; color: #1a2a4a; }
        .topbar-right { display: flex; align-items: center; gap: 12px; }
        .topbar-user { font-size: 13px; color: #666; display: flex; align-items: center; gap: 6px; }

        .hamburger { display: none; background: none; border: none; font-size: 22px; cursor: pointer; color: #1a2a4a; }

        .main-content { margin-left: 240px; margin-top: 60px; padding: 24px; flex: 1; min-width: 0; }

        .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 99; }

        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .sidebar-overlay.open { display: block; }
            .topbar { left: 0; }
            .main-content { margin-left: 0; padding: 16px; }
            .hamburger { display: block; }
        }
    </style>
    {% block extra_style %}{% endblock %}
</head>
<body>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

<div class="sidebar" id="sidebar">
    <div class="sidebar-brand">
        <div class="brand-icon">⚖</div>
        <h2>Prosecutor's Office</h2>
        <p>Manolo Fortich, Bukidnon</p>
    </div>

    <nav class="sidebar-nav">
        <div class="nav-label">Main</div>
        <a href="/staff-home" class="nav-item {% if active_page == 'home' %}active{% endif %}">
            <span class="icon">🏠</span> Home
        </a>
        <a href="/staff-cases" class="nav-item {% if active_page == 'cases' %}active{% endif %}">
            <span class="icon">📁</span> Cases
        </a>
        <a href="/activity-logs" class="nav-item {% if active_page == 'logs' %}active{% endif %}">
            <span class="icon">📋</span> Activity Logs
        </a>

        <div class="nav-label" style="margin-top:8px">Account</div>
        <a href="/profile" class="nav-item {% if active_page == 'profile' %}active{% endif %}">
            <span class="icon">👤</span> Profile
        </a>
    </nav>

    <div class="sidebar-footer">
        <div class="user-info">
            <div class="user-avatar">👤</div>
            <div class="user-details">
                <div class="name">{{ session.user }}</div>
                <div class="role">{{ session.role }}</div>
            </div>
        </div>
        <a href="{{ url_for('logout') }}" class="btn-logout">🚪 Logout</a>
    </div>
</div>

<div class="topbar">
    <div style="display:flex;align-items:center;gap:12px">
        <button class="hamburger" onclick="toggleSidebar()">☰</button>
        <span class="topbar-title">{% block page_title %}Staff Dashboard{% endblock %}</span>
    </div>
    <div class="topbar-right">
        <span class="topbar-user">👤 {{ session.user }}</span>
    </div>
</div>

<div class="main-content">
    {% block content %}{% endblock %}
</div>

<script>
    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('open');
        document.getElementById('sidebarOverlay').classList.toggle('open');
    }
</script>

</body>
</html>
