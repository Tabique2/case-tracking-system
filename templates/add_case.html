<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Case - Case Tracking System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header>
        <div class="header-container">
            <h1>Case Tracking System</h1>
            <div class="header-actions">
                <a href="{{ url_for('dashboard') }}" class="btn">Dashboard</a>
                <a href="{{ url_for('logout') }}" class="btn logout">Logout</a>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="form-card">
            <h2>Add New Case</h2>
            <form method="POST" class="case-form">
                <div class="form-group">
                    <label for="case_number">Case Number</label>
                    <input type="text" name="case_number" id="case_number" placeholder="Enter case number" required>
                </div>

                <div class="form-group">
                    <label for="case_title">Case Title</label>
                    <input type="text" name="case_title" id="case_title" placeholder="Enter case title" required>
                </div>

                <div class="form-group">
                    <label for="complainant">Complainant</label>
                    <input type="text" name="complainant" id="complainant" placeholder="Enter complainant name" required>
                </div>

                <div class="form-group">
                    <label for="respondent">Respondent</label>
                    <input type="text" name="respondent" id="respondent" placeholder="Enter respondent name" required>
                </div>

                <div class="form-group">
                    <label for="status">Status</label>
                    <select name="status" id="status" required>
                        <option value="Open" selected>Open</option>
                        <option value="Pending">Pending</option>
                        <option value="Closed">Closed</option>
                    </select>
                    <label for="case_type">Case Type</label>
                        <select id="case_type" name="case_type" required>
                            <option value="">-- Select Case Type --</option>
                            <option value="RTC">RTC</option>
                            <option value="1st MCTC">1st MUNICIPAL CIRCUIT TRIAL COURT</option>
                            <option value="2nd MCTC">2nd MUNICIPAL CIRCUIT TRIAL COURT</option>
                        </select>
                </div>
            

                <button type="submit" class="btn submit-btn">Add Case</button>
            </form>
        </div>
    </main>

    
</div>
</body>
</html>
